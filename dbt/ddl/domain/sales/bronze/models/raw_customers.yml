# ── Raw customer data — managed by Python ────────────────
# Schema is created by forge; rows are populated by the
# ingest_from_volume Python task reading from the landing Volume.
# Upload sample_data/raw_customers.csv to the Volume to get started.
models:
  raw_customers:
    description: "Raw customer data ingested from Volume"
    managed_by: ingest_from_volume
    columns:
      customer_id:  { type: int, description: "Unique customer identifier" }
      first_name:   { type: string }
      last_name:    { type: string }
      email:        { type: string }
      signup_date:  { type: date }
      country:      { type: string }
      revenue:      { type: "decimal(10,2)" }
