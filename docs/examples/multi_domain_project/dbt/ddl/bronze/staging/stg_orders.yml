# ── Staged orders (domain instances auto-generated) ──────────
# raw_orders is managed_by: python with domain: true — each domain
# automatically reads from its own instance (raw_orders_eu, etc.)
models:
  stg_orders:
    description: "Staged orders with computed line_total"
    source: raw_orders
    columns:
      order_id:     { type: int, required: true, unique: true }
      customer_id:  { type: int, required: true }
      product:      { type: string }
      quantity:     { type: int }
      unit_price:   { type: "decimal(10,2)", cast: true }
      line_total:   { expr: "quantity * unit_price" }
      order_date:   { type: date, cast: true }
