# stg_customers.yml — Domain-aware staging model
# Each domain automatically reads from its own raw_customers instance
# (raw_customers_eu, raw_customers_us, raw_customers_apac) because
# raw_customers is managed_by: python with domain: true.
models:
  stg_customers:
    description: "Staged customers — one instance per domain"
    source: raw_customers
    columns:
      customer_id:  { type: int, required: true, unique: true }
      email:        { type: string }
      country:      { type: string }
      revenue:      { type: "decimal(10,2)", cast: true }
