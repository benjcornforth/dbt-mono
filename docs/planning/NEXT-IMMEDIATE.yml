      Methodology version is already in lineage. 
      Detect changes to udfs:, checks:, or quarantine: and bump version: v2 → v3 automatically.
      Prevents "forgot to bump version" mistakes. 
      One line in apply_migration() + migration dry-run.
    rebuttals: []
    next_steps:
      - Add detection logic in simple_ddl.py
      - Test with existing migration engine

  - id: forge-challenge-prototype
