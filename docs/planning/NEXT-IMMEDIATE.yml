next_immediate_todos:

  - id: provenance-explain-cli
    category: Telemetry • Provenance & Lineage
    title: Add `forge explain <model>.<column>` CLI command
    priority: 1
    status: Pending
    owner: You
    effort: S (1–2 days)
    justification: >
      Provenance already lives in _lineage struct. 
      This turns it into one child-level command: 
      "forge explain customer_summary.total_revenue" 
      → beautiful terminal tree (or --mermaid) showing expression, UDF calls, 
      methodology version, git commit, and every check that validated it.
      Enables "data challenge at any stage" instantly. 
      Uses existing graph.py — zero new concepts.
    rebuttals: []
    next_steps:
      - Add CLI handler in cli.py
      - Reuse graph.walk_lineage() + pretty printer
      - Support --mermaid and --output flags
      - Update auto-generated GUIDE.md section

  - id: reconcile-check-primitive
    category: Features • Data Checks
    title: Add "reconcile" check type (rollup cross-model validation)
    priority: 2
    status: Pending
    owner: You
    effort: M (3–5 days)
    justification: >
      The #1 real-world data bug is revenue mismatch between layers.
      Simple YAML in models.yml:
        checks:
          - name: revenue_match
            type: reconcile
            child_expr: "sum(total_revenue)"
            parent_model: customer_orders
            parent_expr: "sum(line_total)"
            tolerance: 0.0001
      Runs safely in `forge validate` (separate step).
      Adds green/red node to graph. Full result in _checks struct.
      Completes the "rock-solid" promise without any transaction headaches.
    rebuttals:
      - "Cross-model too complex?"
      - "No — separate validate step keeps it simple and debuggable."
    next_steps:
      - Extend compile_checks_sql() in simple_ddl.py
      - New macro dbt-dab-tools/checks/reconcile.sql
      - Add example to test model in dbt/models.yml
      - Graph edge from check node to parent model

  - id: checks-graph-and-sdk
    category: Telemetry • Graph + SDK
    title: Make checks appear in graph diffs + extend Pydantic SDK
    priority: 3
    status: Pending
    owner: You
    effort: S (1 day)
    justification: >
      Graph already shows UDFs (purple). Checks must be visible too.
      `forge diff` should say: "added reconcile check → impacts 2 models".
      SDK models now include .checks_passed, .check_results[] for type-safe apps.
      Code = documentation: SDK reflects checks automatically.
    rebuttals: []
    next_steps:
      - Add check nodes/edges in graph.py
      - Update type_safe.py to parse _checks struct

  - id: auto-version-bump
