# TODO-EDGE-CASES-CONFIG-ONLY.yml
# ────────────────────────────────────────────────────────────────
#   dbt-dab-wrapper — Edge Cases Solved by Configuration Only
#   Date: 23 March 2026
#   Goal: Show the developer exactly which real-world edge cases can be solved
#         today with ONLY changes to forge.yml + dbt/ddl/*.yml files.
#   Rule: Users edit ONLY forge.yml + dbt/ddl/. Everything else generated.
#         Graph shows every instance. One command = deploy/teardown.
#         Never deletes data. Code = the documentation.
# ────────────────────────────────────────────────────────────────

vision:
  "After the domain instances work, many common edge cases are now solvable
   by configuration alone. Here is the honest list of what you can do today
   vs what needs one small unlock."

verdict_key:
  ✅ WORKS TODAY:     config-only, no code changes needed
  ⚠️ PARTIAL:         works globally, not per-domain yet
  🔧 NEEDS CODE:      requires one small merge step (Domain Config Merge)

edge_cases_to_solve:

  # ── ✅ WORKS TODAY ────────────────────────────────────────────

  - id: shared-bronze-with-domain-silver
    priority: 1
    verdict: ✅ WORKS TODAY
    title: Bronze stays shared, Silver/Gold get domain instances
    effort: XS
    how_to_solve:
      - forge.yml: domain_layers: [silver, gold]
      - Bronze models remain single shared instances
      - Domain silver/gold instances automatically ref the shared bronze
    test_command: forge compile && ls dbt/models/bronze/   # only 1 file

  # ── ⚠️ PARTIAL (global, not per-domain) ──────────────────────

  - id: different-broadcast-hints-per-domain
    priority: 2
    verdict: ⚠️ PARTIAL
    title: Different broadcast hints per domain (small table in EU, large in US)
    effort: XS (global)
    how_to_solve_today:
      - In model YAML: broadcast: small_table
      - Applies to ALL domains equally
    unlock_needed: Domain Config Merge (see below)

  - id: different-quarantine-rules-per-domain
    priority: 3
    verdict: ⚠️ PARTIAL
    title: Different quarantine rules per domain (stricter in US)
    effort: XS (global)
    how_to_solve_today:
      - In model YAML: quarantine: "email IS NULL OR revenue < 0"
      - Applies to ALL domains equally
    unlock_needed: Domain Config Merge

  - id: different-materialization-per-domain
    priority: 4
    verdict: ⚠️ PARTIAL
    title: Table in EU, view in US (cost control)
    effort: XS (global)
    how_to_solve_today:
      - In model YAML: materialized: table
      - Applies to ALL domains equally
    unlock_needed: Domain Config Merge

  # ── 🔧 NEEDS CODE ─────────────────────────────────────────────

  - id: different-udfs-per-domain
    priority: 5
    verdict: 🔧 NEEDS CODE
    title: Different UDFs per domain (e.g. EU uses different loyalty logic)
    effort: S
    proposed_design:
      - forge.yml: domains.eu.udf_overrides: { loyalty_tier: loyalty_tier_eu }
      - compile_model() swaps UDF name based on domain

  - id: different-seed-files-per-domain
    priority: 6
    verdict: 🔧 NEEDS CODE
    title: EU reads eu_customers.csv, US reads us_customers.csv
    effort: S
    proposed_design:
      - Reference seed + forge.yml domain seed overrides
      - _ref_or_source() checks domain map

  - id: per-domain-parameters-in-models
    priority: 7
    verdict: 🔧 NEEDS CODE
    title: Same model with different date ranges per domain
    effort: S
    proposed_design:
      - DDL: parameters.date_range
      - forge.yml: domains.eu.parameters.date_range: "last_7_days"

  # ── ✅ WORKS TODAY (newly implemented) ─────────────────────────

  - id: domain-source-routing
    priority: 8
    verdict: ✅ WORKS TODAY
    title: Each domain reads from its own source file
    effort: XS
    how_to_solve:
      - In DDL YAML, add domain_sources: { eu: raw_customers_eu, us: raw_customers_us }
      - Each domain instance compiles with the correct source ref
      - Supports string (single source) and dict (join source override)
    test_command: forge compile && grep "from" dbt/models/demo/bronze/eu/stg_customers_eu.sql

  - id: per-domain-workflows
    priority: 9
    verdict: ✅ WORKS TODAY
    title: Each domain gets its own parallel Databricks workflow
    effort: XS
    how_to_solve:
      - Default behavior: separate workflows (PROCESS_demo_eu, PROCESS_demo_us, etc.)
      - Opt-out: domain_workflows: shared in forge.yml
    test_command: forge workflow   # shows 3 separate workflows

highest_leverage_unlock:
  name: Domain Config Merge (unlocks the 3 PARTIAL cases)
  effort: S (20 lines in compile_all())
  code_sketch:
    # In compile_all(), inside domain expansion loop:
    for domain_name, domain_cfg in domains.items():
        domain_def = {**model_def, "_domain": domain_name}
        overrides = domain_cfg.get("model_overrides", {}).get(model_name, {})
        domain_def.update(overrides)   # ← this one line unlocks broadcast, quarantine, materialized
        sql = compile_model(instance_name, domain_def, ...)

success_criteria:
  - Developer can solve the ✅ cases today with config only
  - The 3 ⚠️ cases become ✅ after Domain Config Merge
  - All 🔧 cases have clear proposed design
  - forge guide updates automatically with the new edge-case section

next_action:
  - Implement Domain Config Merge (highest leverage — unlocks 3 cases)
  - Then tackle different-seed-files-per-domain (most requested)
  - Run forge guide after each — new "Edge Cases Solved by Config" section appears

