review_summary: >
  The teardown you just ran is perfect — safe, no data loss, clear re-instate path.
  Now answering your exact questions about how the Databricks bundle deploy/destroy feature works,
  whether backup can run without local CLI, and how to make workflows/process/teardown/deploy
  appear in the Databricks app after forge deploy.

how_dab_bundle_deploy_destroy_works:
  simple_explanation: >
    Databricks Asset Bundle (DAB) is just a folder of YAML files that describe your entire pipeline.
    The official command is `databricks bundle deploy` (or `destroy`).
    It reads databricks.yml + resources/jobs/*.yml and creates/updates the jobs in the Databricks UI.
    forge currently generates the jobs YAML but does NOT run the bundle command yet — that’s why
    nothing appears in the Databricks app after forge deploy.

  current_state:
    - forge deploy generates resources/jobs/PROCESS_{id}.yml (and now also resources/teardown/TEARDOWN_{id}.yml)
    - forge teardown generates the plan but does NOT run bundle destroy
    - Nothing is pushed to Databricks UI yet

  how_to_make_it_appear_in_databricks_app:
    solution: "One-line change in forge deploy"
    steps:
      - Generate a full databricks.yml at the root (with jobs + resources sections)
      - After generating YAMLs, automatically run `databricks bundle deploy` (using the SDK)
      - forge deploy now ends with: "✅ Deployed to Databricks UI — open Workflows → see PROCESS_demo"
      - Same for teardown: run `databricks bundle destroy` (safe version)

backup_without_local_cli:
  answer: "Yes — 100% possible and recommended"
  how:
    - Make backup a real task inside the DAB job (runs on Databricks serverless, no local machine needed)
    - Add a new task_key: backup-before-teardown
    - This task runs the archive SQL (collect_list(to_json(struct(*))) into _backup_archive)
    - User can trigger backup from the Databricks UI without ever opening a terminal
    - forge deploy can optionally include a "backup-now" task

structure_as_full_dab:
  recommended_structure:
    root:
      - databricks.yml          ← auto-generated full bundle config
      - resources/
        - jobs/
          - PROCESS_{id}.yml    ← main pipeline (per-model tasks)
          - TEARDOWN_{id}.yml   ← safe teardown job (only orchestration + backup)
    how_forge_deploy_will_work:
      - Generate all YAMLs
      - Run `databricks bundle deploy`
      - Output: "✅ Everything now visible in Databricks → Workflows tab"
    how_forge_teardown_will_work:
      - Run backup task first (on Databricks)
      - Then `databricks bundle destroy`
      - Output: "✅ Job removed from UI — data safely archived — re-instate with forge deploy"

