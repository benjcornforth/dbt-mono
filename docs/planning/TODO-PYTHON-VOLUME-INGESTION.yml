# ============================================================================
# SECTION 9: FUTURE INGESTION TYPES — EXTENSIBILITY ROADMAP
# ============================================================================
#
# The Volume ingestion pattern establishes a contract that future
# ingestion types must follow.  This section defines each future type,
# what it adds, and what it reuses from the existing infrastructure.
#
# ── THE UNIVERSAL CONTRACT ──────────────────────────────────────────────
#
#   Every ingestion type shares:
#     1. A row in ingestion_config with ingest_type = "<type>"
#     2. A Python task (or handler within the dispatching task)
#     3. A manifest table tracking what was ingested
#     4. write_table_with_lineage() for provenance
#     5. Declared in DDL YAML → appears in graph → tested by schema.yml
#
#   What differs per type:
#     • Source location (Volume path vs API URL vs Kafka topic)
#     • Read mechanism (Spark file read vs HTTP client vs consumer)
#     • Config columns (file_regex vs api_url vs topic_name)
#     • Manifest columns (file_path vs request_id vs offset)
#
# ── TYPE REGISTRY ───────────────────────────────────────────────────────

future_ingestion_types:

  - type: api
    title: "REST / GraphQL API ingestion"
    priority: HIGH
    description: >
      Many raw datasets arrive via paginated REST APIs (e.g., Salesforce,
      Stripe, internal microservices).  The Python task makes HTTP calls,
      paginates, and writes JSON/DataFrame to raw tables.
    config_columns_added:
      - api_url:        { type: string, description: "Base endpoint URL" }
      - api_method:     { type: string, description: "GET | POST" }
      - api_headers:    { type: string, description: "JSON-encoded headers (secrets via scope reference)" }
      - api_pagination: { type: string, description: "offset | cursor | link" }
      - api_page_size:  { type: int }
    manifest_columns_added:
      - request_id:     { type: string, description: "Unique request correlation ID" }
      - http_status:    { type: int }
      - response_bytes: { type: bigint }
    handler_sketch: |
      # Inside the dispatch loop:
      if cfg.ingest_type == "api":
          import requests
          session = requests.Session()
          session.headers.update(json.loads(cfg.api_headers))
          data = paginate(session, cfg.api_url, cfg.api_pagination)
          df = spark.createDataFrame(data)
          task.write_table_with_lineage(target, df, source_type="api")
    what_reuses:
      - ingestion_config table (add columns, existing rows untouched)
      - file_manifest (rename to ingestion_manifest or add source_type column)
      - write_table_with_lineage() (source_type="api")
      - managed_by: python (raw table DDL)
      - Domain parameter injection (per-domain API endpoints)
    limitations:
      - id: api-secrets
        severity: MEDIUM
        description: "API keys/tokens must not be in ingestion_config CSV"
        mitigation: >
          Reference Databricks secret scopes in the headers column:
          "Authorization: Bearer {{secret/scope/key}}".  The Python
          task resolves via dbutils.secrets.get().  forge doesn't
          manage secrets — it references them.
      - id: api-rate-limiting
        severity: LOW
        mitigation: "Built into the paginate() helper with configurable delay"

  - type: kafka
    title: "Event / message queue ingestion (Kafka, Event Hub)"
    priority: MEDIUM
    description: >
      Consume events from Kafka topics or Azure Event Hubs.  The task
      reads a batch of messages (not streaming — batch-triggered),
      writes to raw tables, and commits offsets to the manifest.
    config_columns_added:
      - topic:              { type: string }
      - bootstrap_servers:  { type: string }
      - consumer_group:     { type: string }
      - batch_size:         { type: int, description: "Max messages per run" }
    manifest_columns_added:
      - topic:      { type: string }
      - partition:  { type: int }
      - offset:     { type: bigint }
      - msg_count:  { type: int }
    handler_sketch: |
      if cfg.ingest_type == "kafka":
          df = spark.read.format("kafka") \
               .option("subscribe", cfg.topic) \
               .option("kafka.bootstrap.servers", cfg.bootstrap_servers) \
               .option("startingOffsets", last_offset_from_manifest) \
               .load()
          task.write_table_with_lineage(target, df, source_type="kafka")
    what_reuses:
      - Full infrastructure (config table, manifest, lineage, graph)
    limitations:
      - id: kafka-exactly-once
        severity: MEDIUM
        description: "Batch consume + manifest offset tracking gives at-least-once"
        mitigation: "Downstream dedup via primary key or MERGE — standard pattern"
      - id: kafka-vs-autoloader
        severity: LOW
        description: >
          For true streaming, Databricks Auto Loader is better.
          This type covers scheduled batch consumption only.

  - type: jdbc
    title: "JDBC / cross-database ingestion"
    priority: MEDIUM
    description: >
      Pull data from external databases (Postgres, MySQL, Oracle, SQL
      Server) via JDBC.  The task reads a table or query, optionally
      with watermark-based incremental logic, and writes to raw.
    config_columns_added:
      - jdbc_url:       { type: string }
      - jdbc_table:     { type: string, description: "Source table or (subquery)" }
      - jdbc_driver:    { type: string }
      - watermark_col:  { type: string, description: "Column for incremental reads" }
    manifest_columns_added:
      - jdbc_table:     { type: string }
      - watermark_value: { type: string, description: "Last seen watermark value" }
      - row_count:      { type: bigint }
    handler_sketch: |
      if cfg.ingest_type == "jdbc":
          reader = spark.read.format("jdbc") \
                   .option("url", cfg.jdbc_url) \
                   .option("dbtable", cfg.jdbc_table) \
                   .option("driver", cfg.jdbc_driver)
          if cfg.watermark_col:
              last_wm = get_last_watermark(manifest_table, cfg)
              reader = reader.option("predicates",
                  [f"{cfg.watermark_col} > '{last_wm}'"])
          df = reader.load()
          task.write_table_with_lineage(target, df, source_type="jdbc")
    what_reuses:
      - Full infrastructure
    limitations:
      - id: jdbc-credentials
        severity: HIGH
        description: "JDBC URLs often contain credentials"
        mitigation: >
          Reference Databricks secrets: jdbc_url stores the secret
          scope/key path, resolved at runtime.  Never in CSV.

  - type: sftp
    title: "SFTP / cloud-to-cloud file transfer"
    priority: LOW
    description: >
      Download files from SFTP servers or cloud storage buckets
      (cross-account S3, GCS, ADLS) into a Volume, then ingest.
      This is a two-phase process: transfer → volume ingest.
    config_columns_added:
      - sftp_host:    { type: string }
      - sftp_path:    { type: string }
      - sftp_user:    { type: string }
    handler_sketch: |
      if cfg.ingest_type == "sftp":
          # Phase 1: Download to Volume
          import paramiko
          ssh = paramiko.SSHClient()
          # ... download files to volume_path ...
          # Phase 2: Delegate to volume handler
          volume_ingest(task, cfg, spark, existing, manifest_table)
    what_reuses:
      - Volume infrastructure (files land in Volume first)
      - Volume handler (reused for Phase 2)
    limitations:
      - id: sftp-credentials
        severity: HIGH
        mitigation: "Databricks secret scopes for SSH keys / passwords"

  - type: webscraper
    title: "Web scraper ingestion"
    priority: LOW
    description: >
      Scrape structured data from web pages.  Already tracked as
      origin.type: webscraper in lineage metadata.  The task
      fetches HTML, parses with BeautifulSoup/Scrapy, writes to raw.
    config_columns_added:
      - scrape_url:       { type: string }
      - scrape_selector:  { type: string, description: "CSS selector or XPath" }
      - scrape_schedule:  { type: string, description: "Cron for freshness" }
    what_reuses:
      - Full infrastructure
    limitations:
      - id: scrape-reliability
        severity: MEDIUM
        description: "HTML structure changes break scrapers"
        mitigation: "Selector stored in config → update CSV, redeploy"

# ── EXTENSIBILITY PATTERN ──────────────────────────────────────────────
#
# To add a new ingestion type:
#
#   1. Add type-specific columns to ingestion_config DDL YAML
#      (nullable — existing rows unaffected)
#
#   2. Add rows to ingestion_config.csv with ingest_type = "<type>"
#
#   3. Add a handler function in the Python task template:
#        def handle_<type>(task, cfg, spark, existing, manifest_table):
#            ...
#
#   4. Register the handler in the dispatch dict:
#        HANDLERS = {
#            "volume": handle_volume,
#            "api":    handle_api,
#            ...
#        }
#
#   5. Optional: Add type-specific manifest columns (nullable)
#
#   NO CORE CODE CHANGES NEEDED for steps 1-5.
#   The only core change is if the type needs a new DDL key
#   (e.g., volumes: needed compile_volumes()).  API/Kafka/JDBC
#   don't need new DDL keys — they're config-driven.
#
# ── IMPACT ON DDL YAML ─────────────────────────────────────────────────
#
#   DDL YAML changes needed per type:
#     volume:     volumes: (new top-level key)        ← Phase 1
#     api:        none (config-only)                  ← future
#     kafka:      none (config-only)                  ← future
#     jdbc:       none (config-only)                  ← future
#     sftp:       reuses volumes: key                 ← future
#     webscraper: none (config-only)                  ← future
#
#   This is the key design win: after Phase 1, adding new ingestion
#   types is pure configuration + a Python handler function.
#   No new DDL keys, no compiler changes, no graph changes.