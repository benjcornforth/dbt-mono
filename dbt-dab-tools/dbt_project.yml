# =============================================
# dbt-dab-tools — reusable dbt macro package
# =============================================
# Install via packages.yml in any project:
#
#   packages:
#     - local: ../dbt-dab-tools        # local dev
#     - git: https://github.com/yourorg/dbt-dab-tools  # prod
#       version: [">=0.2.0", "<1.0.0"]
#
# Provides:
#   {{ lineage_columns() }}   — ODCS row-level provenance
#   {{ quarantine('...') }}   — post_hook quarantine for bad rows
#   {{ prior_version('x') }}  — safe rollback references
#   {{ python_udf('x') }}    — Databricks Python UDF creation

name: 'dbt_dab_tools'
version: '0.2.0'
config-version: 2

# No models/seeds/tests — this is a macro-only package
macro-paths: ["macros"]

# Default vars (consumers can override in their dbt_project.yml)
vars:
  git_commit: "local"
  compute_type: "serverless"
  methodology_version: "v1"
