# SUMMARY-DOMAIN-INSTANCES-GROUPING.yml
# ────────────────────────────────────────────────────────────────
#   dbt-dab-wrapper — Domain-Based Model Instances
#   Date: 23 March 2026
#   Status: Phase 1 COMPLETE ✅ | Subfolder grouping DONE ✅ | Deploy DONE ✅
#           Domain Source Routing DONE ✅ | Per-Domain Workflows DONE ✅
#   Goal: Same model runs in many domains (EU, US, APAC) in different schemas
#         with different source files — no code duplication.
#   Rule: Users edit ONLY forge.yml + dbt/ddl/. Everything else generated.
#         Graph shows every instance. One command = deploy/teardown.
#         Never deletes data. Code = the documentation.
# ────────────────────────────────────────────────────────────────

current_state:
  how_instances_work_today:
    - forge.yml has a domains: block (schema_suffix per domain)
    - forge compile creates per-domain subfolders with suffixed files
    - Each instance is a real dbt model (customer_clean_eu, customer_clean_us)
    - Schema is hardcoded in the .sql file (ben_demo_eu)
    - domain_layers configurable in forge.yml (bronze/silver/gold bifurcation)
      - e.g. domain_layers: [silver, gold] = only silver+ get domain instances
      - e.g. domain_layers: [bronze, silver, gold] = all layers bifurcated
    - Bifurcated layers skip the default instance (no stg_customers.sql when bronze is bifurcated)
    - Default instances only generated for non-bifurcated layers
    - forge deploy prepends CREATE SCHEMA IF NOT EXISTS for UDF target schema
    - Verified: 15/15 models deployed successfully to Databricks

  folder_structure: |
    dbt/models/demo/
    ├── bronze/
    │   ├── eu/
    │   │   ├── stg_customers_eu.sql
    │   │   └── stg_orders_eu.sql
    │   ├── us/
    │   │   ├── stg_customers_us.sql
    │   │   └── stg_orders_us.sql
    │   └── apac/
    │       ├── stg_customers_apac.sql
    │       └── stg_orders_apac.sql
    └── silver/
        ├── eu/
        │   ├── customer_clean_eu.sql
        │   ├── customer_orders_eu.sql
        │   └── customer_summary_eu.sql
        ├── us/
        │   └── ...
        └── apac/
            └── ...

  naming_approach:
    - Suffixed filenames in domain subfolders (customer_summary_eu.sql in silver/eu/)
    - Avoids dbt naming conflict (dbt derives model name from filename)
    - File explorer is self-documenting — open silver/eu/ to see EU logic

backup_and_teardown_impact:
  backups:
    - Unaffected by grouping choice
    - Each instance (customer_summary_eu) gets its own row in _backup_archive
    - Compact JSON array per table (one row per asset)
    - forge teardown always archives domain instances separately

  teardowns:
    - Unaffected by grouping choice
    - forge teardown lists each domain instance clearly
    - Only removes orchestration + code (never data)
    - Ends with "♻️ Re-instate any instance: forge deploy"
    - --domain eu flag can scope teardown to one domain (future)

bugs_fixed:
  - issue: "UDF deploy failed — SCHEMA_NOT_FOUND when bronze is fully bifurcated"
    cause: "DROP FUNCTION IF EXISTS targets dev_fd_bronze.ben_demo, but that schema was never created"
    fix: "Prepend CREATE SCHEMA IF NOT EXISTS to UDF SQL batch in cli.py deploy"
  - issue: "Bifurcated layers still produced default .sql files"
    cause: "compile_all() wrote default instance before checking domain_layers"
    fix: "Skip default .sql + schema.yml entry when layer is in domain_layers"
  - issue: "Teardown --wipe-all dropped base schema but left domain schemas alive"
    cause: "build_teardown_plan() only iterated base schemas, not domain-suffixed ones"
    fix: "Added domain schema loop in teardown.py — crosses catalogs × domain_layers × domains"

success_criteria:
  - Domain subfolders with suffixed files (silver/eu/customer_clean_eu.sql)       # DONE
  - Bifurcated layers skip default instances                                     # DONE
  - forge deploy creates domain schemas + tables automatically                   # DONE (15/15 models)
  - forge explain customer_summary_eu works (shows domain + source)              # Phase 2+
  - Graph shows each instance as its own node with domain badge                  # Phase 2
  - forge teardown is safe (archives only, clear re-instate path)                # DONE

auto_documentation:
  - After every change: run `forge guide`
  - forge guide has been run — domain section available

recent_changes:
  domain_source_routing:
    status: ✅ DONE
    date: 2026-03-23
    description: >
      Added domain_sources: key in DDL YAML. Each domain instance can read
      from its own source (e.g. raw_customers_eu for EU). Supports string
      (single source override) and dict (join source override).
    example: |
      # In dbt/ddl/bronze/staging/stg_customers.yml
      models:
        stg_customers:
          source: raw_customers
          domain_sources:
            eu: raw_customers_eu
            us: raw_customers_us
    verified: "forge compile → stg_customers_eu.sql reads from {{ ref('raw_customers_eu') }}"

  per_domain_workflows:
    status: ✅ DONE
    date: 2026-03-23
    description: >
      Each domain gets its own Databricks workflow (PROCESS_demo_eu, PROCESS_demo_us, etc.)
      for parallel scheduling. Opt-out with domain_workflows: shared in forge.yml.
    code: build_domain_workflows() in workflow.py
    verified: "forge workflow → 3 separate workflows with 11 tasks each"

next_action:
  - Remaining work: graph domain tags, teardown --domain flag
  - Domain Config Merge (unlocks per-domain broadcast/quarantine/materialization)
  - Migration tooling for domain instances

