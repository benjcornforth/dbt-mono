# ── Raw order data from CSV ──────────
seeds:
  raw_orders:
    description: "Raw order data loaded from CSV seed"
    origin:
      type: seed
      path: dbt/seeds/raw_orders.csv
      format: csv
    columns:
      order_id:     { type: int, description: "Unique order identifier" }
      customer_id:  { type: int, description: "FK to raw_customers" }
      product:      { type: string }
      quantity:     { type: int }
      unit_price:   { type: "decimal(10,2)" }
      order_date:   { type: date }
