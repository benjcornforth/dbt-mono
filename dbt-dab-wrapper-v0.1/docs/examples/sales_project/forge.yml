# forge.yml - the ONLY config file you ever edit
# A child can change 3 lines and redeploy everything.
name: sales_data
active_profile: prod

profiles:
  dev:
    platform: databricks
    databricks_profile: DEFAULT       # reads ~/.databrickscfg [DEFAULT]
    catalog: main
    schema: dev_silver
    compute:
      type: serverless
      auto_scale: true

  prod:
    platform: databricks
    databricks_profile: PROD          # reads ~/.databrickscfg [PROD]
    catalog: main
    schema: silver
    compute:
      type: serverless
    schedule: "0 0 6 * * ?"

  local:
    platform: postgres                # databricks | postgres | redshift
    connection:
      host: localhost
      port: 5432
      database: sales_db
    catalog: public
    schema: silver
    compute:
      type: local

dbt:
  version: "1.8.0"
  adapter: databricks

features:
  graph: true
  quarantine: true
  validation_exceptions: true
  prior_version: true
  python_udfs: true

portability:
  avoid_databricks_only: true      # forces clean SQL
  postgres_compatible: true
