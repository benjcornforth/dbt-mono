# ── Joined customers with orders (domain instances auto-generated) ──────────
models:
  customer_orders:
    description: "Joined clean customers with their orders"
    sources:
      c: customer_clean
      o: stg_orders
    join: "c.customer_id = o.customer_id"
    broadcast: c
    materialized: table
    columns:
      customer_id:  { from: c }
      email:        { from: c }
      country:      { from: c }
      order_id:     { from: o, required: true, unique: true }
      product:      { from: o }
      line_total:   { from: o }
      order_date:   { from: o }
