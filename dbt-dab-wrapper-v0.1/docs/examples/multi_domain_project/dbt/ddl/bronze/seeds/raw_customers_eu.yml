# ── EU raw customer data ──────────
seeds:
  raw_customers_eu:
    description: "Raw customer data for the EU region"
    domain: false
    origin:
      type: seed
      path: dbt/seeds/raw_customers_eu.csv
      format: csv
    columns:
      customer_id:  { type: int, description: "Unique customer identifier" }
      email:        { type: string }
      country:      { type: string }
      revenue:      { type: "decimal(10,2)" }
