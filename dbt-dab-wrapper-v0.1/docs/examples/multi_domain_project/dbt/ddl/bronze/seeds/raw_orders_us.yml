# ── US raw order data ──────────
seeds:
  raw_orders_us:
    description: "Raw order data for the US region"
    domain: false
    origin:
      type: seed
      path: dbt/seeds/raw_orders_us.csv
      format: csv
    columns:
      order_id:     { type: int, description: "Unique order identifier" }
      customer_id:  { type: int }
      product:      { type: string }
      quantity:     { type: int }
      unit_price:   { type: "decimal(10,2)" }
      order_date:   { type: date }
