# =============================================
# dbt_project.yml
# =============================================
# THE CODE IS THE DOCUMENTATION
#
# This is the dbt project config for forge.
# Forge reads forge.yml, but dbt needs this file.
# Project macros live in macros/.

name: 'sales_data'
version: '0.2.0'
config-version: 2

profile: 'sales_data'

# =============================================
# PATHS - business logic in dbt/, tooling in dbt-tools/
# =============================================
model-paths: ["dbt/models", "dbt/sources"]
seed-paths: ["dbt/seeds"]
test-paths: ["dbt/tests"]
analysis-paths: ["dbt/analysis"]
macro-paths: ["macros"]               # project-level macros (if any)
snapshot-paths: ["dbt/snapshots"]
asset-paths: ["dbt/assets"]

clean-targets:
  - "dbt/target"
  - "dbt_packages"

# =============================================
# VARS - lineage provenance injected at deploy time
# =============================================
# The forge CLI sets these via --vars at runtime.
# Defaults here for local development.
vars:
  git_commit: "local"
  compute_type: "serverless"
  methodology_version: "v1"
  catalog_bronze: "dev_fd_bronze"
  catalog_silver: "dev_fd_silver"
  catalog_meta: "dev_fd_meta"
  schema_bronze: "ben_sales"
  schema_silver: "ben_sales"
  schema_gold: "ben_sales"

# =============================================
# SEED DEFAULTS
# =============================================
seeds:
  sales_data:
    ingestion_config:
      +database: "{{ var('catalog_meta', 'dev_fd_meta') }}"
      +schema: config

# =============================================
# MODEL DEFAULTS
# =============================================
models:
  dbt_forge:
    +materialized: view
