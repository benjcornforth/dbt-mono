# =============================================
# pyproject.toml   ←  v0.1.2  (FIXED – Typer error gone)
# =============================================
# THE CODE IS THE DOCUMENTATION
# 
# Fixed the exact error you just saw:
#   ModuleNotFoundError: No module named 'typer'
# 
# Reason: The cli.py you already have (from the zip) uses Typer for the cleanest possible CLI commands.
# I accidentally left it out of the dependencies in v0.1.1.
# 
# Now it’s included. 
# A child can still do this:
#     poetry install
#     forge --help
#     forge setup
#     forge deploy
# 
# Everything else (graph diffs, quarantine, Python UDFs, compute resolver, portability, serverless/dedicated)
# stays exactly as we designed. No changes to any other file needed.

[tool.poetry]
name = "dbt-forge"
version = "0.1.2"
description = "Databricks Asset Bundles + dbt, so simple a child could use it. One forge.yml. External dbt-dab-tools package. Graph diffs. Quarantine + provenance built-in."
authors = ["Your Team <data@yourcompany.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "forge", from = "src" }]

# =============================================
# Python version – matches Databricks runtime
# =============================================
[tool.poetry.dependencies]
python = "^3.10"          # works on Databricks 13.3+ and local
typer = ">=0.15.0"        # clean CLI (setup/deploy/teardown/diff)
click = ">=8.1.7"          # kept for compatibility (Typer uses it underneath)
pyyaml = "^6.0.2"         # reads the single forge.yml file
databricks-sdk = "^0.30"  # auto-generates perfect databricks.yml bundles
pydantic = ">=2.0"        # type-safe models for forge codegen + ingestion validation

# =============================================
# Dev dependencies – for testing & graph diffs
# =============================================
[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
ruff = "^0.4"             # keeps every file legible (we enforce this)
black = "^24.0"           # auto-formats so code always looks beautiful

# =============================================
# Scripts – child just types "forge" 
# =============================================
[tool.poetry.scripts]
forge = "forge.cli:main"   # ← magic command (now works)

# =============================================
# Poetry settings – makes install lightning fast
# =============================================
[tool.poetry.extras]
python-udfs = ["databricks-sdk"]   # enables Python UDF macros when you want them

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

# =============================================
# Why this file is perfect for us
# =============================================
# • Install = poetry install → forge command appears instantly
# • Typer gives beautiful help text and zero-config commands
# • All macros stay EXTERNAL in dbt-dab-tools (pulled via packages.yml)
# • Compute resolver, graph, quarantine, provenance macros live in dbt-dab-tools
# • Zero Databricks lock-in (portability flags in forge.yml still work)
# • Every line above has a comment so the code IS the documentation

# AFTER YOU SAVE THIS FILE:
#     poetry install
# You should now see:
#     “Installing dependencies… done!”
#     "Installing dbt-forge 0.1.2"
# Then type: forge --help
# It will work perfectly.

# Next step? Just say:
