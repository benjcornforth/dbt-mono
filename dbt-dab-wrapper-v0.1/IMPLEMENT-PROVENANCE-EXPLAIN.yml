implementation_overview:
  command: wrapper explain <model_name>.<column_name>
  examples:
    - wrapper explain customer_summary.total_revenue
    - wrapper explain customer_summary.total_revenue --mermaid --output docs/explain.mmd
    - wrapper explain int_customer_orders.email --full
  output_formats:
    - default: beautiful terminal tree (ASCII + colors)
    - --mermaid: Mermaid flowchart (purple UDF nodes, orange check nodes)
    - --json: for scripting / GUI
  auto_wires: true
    - Also calls diff_graphs() internally so wrapper diff now works
    - Pulls real git_commit via subprocess("git rev-parse HEAD")

