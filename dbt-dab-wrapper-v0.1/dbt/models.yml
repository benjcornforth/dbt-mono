# =============================================
# dbt/models.yml – THE ONLY FILE YOU EDIT
# =============================================
# No SQL needed. Just describe your tables in plain YAML.
# Run: forge compile → generates all SQL automatically.
#
# Column options:
#   type:       int, string, date, decimal(10,2), etc.
#   required:   true → column cannot be NULL
#   unique:     true → column must be unique
#   cast:       true → converts the type from upstream
#   expr:       "count(order_id)" → custom calculation
#   from:       c → which join alias the column comes from
#   udf:        "loyalty_tier(total_revenue)" → call a UDF
#   description: "Human-readable description"

# ── Reusable functions (SQL-first) ──────────
udfs:
  loyalty_tier:
    description: "Assigns GOLD/SILVER/BRONZE based on revenue"
    language: sql
    returns: string
    params:
      - { name: revenue, type: "decimal(18,2)" }
    body: |
      CASE
        WHEN revenue >= 1000 THEN 'GOLD'
        WHEN revenue >=  500 THEN 'SILVER'
        ELSE 'BRONZE'
      END

# NOTE: diff_backup_history() and fetch_last_deployments() are managed by the
# forge wrapper (dbt-dab-tools package). Deploy them with:
#   dbt run-operation deploy_forge_udfs

models:

  # ── Staging: customers ──────────────────────
  stg_customers:
    description: "Staged customers with typed columns and lineage provenance"
    source: raw_customers
    columns:
      customer_id:  { type: int, required: true, unique: true, description: "Unique customer identifier" }
      first_name:   { type: string }
      last_name:    { type: string }
      email:        { type: string, description: "Customer email (may be null in raw data)" }
      signup_date:  { type: date, cast: true }
      country:      { type: string }
      revenue:      { type: "decimal(10,2)", cast: true }

  # ── Staging: orders ────────────────────────
  stg_orders:
    description: "Staged orders with computed line_total and lineage provenance"
    source: raw_orders
    columns:
      order_id:     { type: int, required: true, unique: true, description: "Unique order identifier" }
      customer_id:  { type: int, required: true, description: "FK to customers" }
      product:      { type: string }
      quantity:     { type: int }
      unit_price:   { type: "decimal(10,2)", cast: true }
      line_total:   { expr: "quantity * unit_price" }
      order_date:   { type: date, cast: true }

  # ── Clean: quarantine bad rows ─────────────
  customer_clean:
    description: "Clean customers - null emails and negative revenue quarantined"
    source: stg_customers
    materialized: table
    version: v2
    quarantine: "email IS NULL OR revenue < 0"
    columns:
      customer_id:  { type: int, required: true, unique: true }
      first_name:   { type: string }
      last_name:    { type: string }
      email:        { type: string, required: true, description: "Validated email (nulls quarantined)" }
      signup_date:  { type: date }
      country:      { type: string }
      revenue:      { type: "decimal(10,2)", description: "Non-negative revenue (negatives quarantined)" }

  # ── Enrich: join customers + orders ────────
  customer_orders:
    description: "Joined clean customers with their orders"
    sources:
      c: customer_clean
      o: stg_orders
    join: "c.customer_id = o.customer_id"
    materialized: table
    version: v1
    columns:
      customer_id:  { from: c }
      first_name:   { from: c }
      last_name:    { from: c }
      email:        { from: c }
      country:      { from: c }
      order_id:     { from: o, required: true, unique: true }
      product:      { from: o }
      quantity:     { from: o }
      unit_price:   { from: o }
      line_total:   { from: o }
      order_date:   { from: o }

  # ── Serve: aggregated metrics ──────────────
  customer_summary:
    description: "Aggregated customer metrics - gold layer"
    source: customer_orders
    materialized: table
    version: v1
    group_by: [customer_id, first_name, last_name, email, country]
    columns:
      customer_id:    { type: int, required: true, unique: true }
      first_name:     { type: string }
      last_name:      { type: string }
      email:          { type: string }
      country:        { type: string }
      total_orders:   { expr: "count(order_id)", type: int, description: "Count of orders per customer" }
      total_revenue:  { expr: "sum(line_total)", type: "decimal(10,2)", description: "Sum of all order line totals" }
      first_order_date: { expr: "min(order_date)", type: date }
      last_order_date:  { expr: "max(order_date)", type: date }
      tier:             { udf: "loyalty_tier(total_revenue)", type: string, description: "GOLD/SILVER/BRONZE loyalty tier" }
    checks:
      - name: revenue_non_negative
        type: range
        column: total_revenue
        min: 0
        severity: error
      - name: data_is_fresh
        type: recency
        column: last_order_date
        max_age: "7 days"
        severity: warn
      - name: has_customers
        type: row_count
        min: 1
        severity: error
