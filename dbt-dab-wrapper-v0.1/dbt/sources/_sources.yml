version: 2
sources:
- name: seed_meta_config
  description: Seed data in meta.config
  tables:
  - name: ingestion_config
    description: File-matching rules for Volume ingestion
    columns:
    - name: config_id
      description: Unique config identifier
    - name: ingest_type
      description: 'Discriminator: volume | api | kafka | jdbc | sftp'
    - name: source_name
      description: Logical name (e.g. customer_feed)
    - name: target_model
      description: Raw model name to write into
    - name: volume_name
      description: Volume name to scan (ingest_type=volume)
    - name: file_regex
      description: Regex pattern to match filenames
    - name: file_format
      description: 'File format: csv, json, parquet, delta'
    - name: has_header
      description: Whether CSV has a header row
    - name: delimiter
      description: CSV delimiter character
    - name: active
      description: Toggle rule on/off
  database: meta
  schema: config
