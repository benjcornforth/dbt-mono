# ── Reusable functions (SQL / Python / Pandas) ──────────
udfs:
  loyalty_tier:
    description: "Assigns GOLD/SILVER/BRONZE based on revenue"
    language: sql
    returns: string
    params:
      - { name: revenue, type: "decimal(18,2)" }
    body: |
      CASE
        WHEN revenue >= 1000 THEN 'GOLD'
        WHEN revenue >=  500 THEN 'SILVER'
        ELSE 'BRONZE'
      END

  clean_email:
    description: "Lowercase and trim email addresses"
    language: python
    returns: string
    runtime_version: "3.11"
    handler: clean
    params:
      - { name: raw_email, type: string }
    body: |
      def clean(raw_email):
          if raw_email is None:
              return None
          return raw_email.strip().lower()

  average_score:
    description: "Vectorized average using pandas — fast on large batches"
    language: pandas
    returns: double
    runtime_version: "3.11"
    handler: compute
    packages: [pandas, numpy]
    params:
      - { name: score_a, type: double }
      - { name: score_b, type: double }
    body: |
      import pandas as pd
      def compute(score_a: pd.Series, score_b: pd.Series) -> pd.Series:
          return (score_a + score_b) / 2.0
