resources:
  jobs:
    PROCESS_demo_apac:
      name: PROCESS_demo_apac (dev)
      tasks:
      - task_key: ingest_data_is_fresh
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select data_is_fresh
          catalog: main
          schema: default
        environment_key: default
      - task_key: ingest_has_customers
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select has_customers
          catalog: main
          schema: default
        environment_key: default
      - task_key: ingest_raw_customers
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select raw_customers
          catalog: main
          schema: default
        environment_key: default
      - task_key: ingest_raw_orders
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select raw_orders
          catalog: main
          schema: default
        environment_key: default
      - task_key: ingest_revenue_non_negative
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select revenue_non_negative
          catalog: main
          schema: default
        environment_key: default
      - task_key: stage_customer_orders_apac
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select customer_orders_apac
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: clean_customer_clean_apac
        - task_key: stage_stg_orders_apac
      - task_key: stage_customer_summary_apac
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select customer_summary_apac
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: stage_customer_orders_apac
      - task_key: stage_stg_customers_apac
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select stg_customers_apac
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: ingest_raw_customers
      - task_key: stage_stg_orders_apac
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select stg_orders_apac
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: ingest_raw_orders
      - task_key: clean_customer_clean_apac
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select customer_clean_apac
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: stage_stg_customers_apac
      - task_key: enrich_run_reconciliation
        timeout_seconds: 3600
        sql_task:
          file:
            path: sql/reconcile.sql
        environment_key: default
      - task_key: serve_notify_slack
        timeout_seconds: 3600
        notebook_task:
          notebook_path: notebooks/slack_alert.ipynb
        environment_key: default
