resources:
  jobs:
    PROCESS_sales:
      name: PROCESS_sales (dev)
      tasks:
      - task_key: ingest_file_manifest
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select file_manifest --vars ''{"schema_bronze": "ben_sales",
            "schema_silver": "ben_sales", "schema_gold": "ben_sales", "catalog_bronze":
            "dev_fd_bronze", "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta",
            "git_commit": "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
      - task_key: ingest_raw_customers
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select raw_customers --vars ''{"schema_bronze": "ben_sales",
            "schema_silver": "ben_sales", "schema_gold": "ben_sales", "catalog_bronze":
            "dev_fd_bronze", "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta",
            "git_commit": "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
      - task_key: ingest_raw_orders
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select raw_orders --vars ''{"schema_bronze": "ben_sales", "schema_silver":
            "ben_sales", "schema_gold": "ben_sales", "catalog_bronze": "dev_fd_bronze",
            "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta", "git_commit":
            "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
      - task_key: stage_customer_orders
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select customer_orders --vars ''{"schema_bronze": "ben_sales",
            "schema_silver": "ben_sales", "schema_gold": "ben_sales", "catalog_bronze":
            "dev_fd_bronze", "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta",
            "git_commit": "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: clean_customer_clean
        - task_key: stage_stg_orders
      - task_key: stage_customer_summary
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select customer_summary --vars ''{"schema_bronze": "ben_sales",
            "schema_silver": "ben_sales", "schema_gold": "ben_sales", "catalog_bronze":
            "dev_fd_bronze", "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta",
            "git_commit": "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: stage_customer_orders
      - task_key: stage_stg_customers
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select stg_customers --vars ''{"schema_bronze": "ben_sales",
            "schema_silver": "ben_sales", "schema_gold": "ben_sales", "catalog_bronze":
            "dev_fd_bronze", "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta",
            "git_commit": "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: ingest_raw_customers
      - task_key: stage_stg_orders
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select stg_orders --vars ''{"schema_bronze": "ben_sales", "schema_silver":
            "ben_sales", "schema_gold": "ben_sales", "catalog_bronze": "dev_fd_bronze",
            "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta", "git_commit":
            "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: ingest_raw_orders
      - task_key: clean_customer_clean
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run --select customer_clean --vars ''{"schema_bronze": "ben_sales",
            "schema_silver": "ben_sales", "schema_gold": "ben_sales", "catalog_bronze":
            "dev_fd_bronze", "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta",
            "git_commit": "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: stage_stg_customers
      - task_key: ingest_py_ingest_from_volume
        timeout_seconds: 3600
        environment_key: default
        spark_python_task:
          python_file: ../../python/ingest_from_volume.py
        depends_on:
        - task_key: ingest_raw_orders
      environments:
      - environment_key: default
        spec:
          client: '2'
          dependencies:
          - dbt-databricks
          - pydantic>=2.0
          - pyyaml
