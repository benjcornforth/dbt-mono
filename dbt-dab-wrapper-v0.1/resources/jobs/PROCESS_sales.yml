resources:
  jobs:
    PROCESS_sales:
      name: PROCESS_sales (dev)
      tasks:
      - task_key: stage_customer_orders
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/008_customer_orders.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: clean_customer_clean
        - task_key: stage_stg_orders
      - task_key: stage_customer_summary
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/009_customer_summary.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: stage_customer_orders
      - task_key: stage_stg_customers
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/005_stg_customers.sql
          warehouse_id: 724607f766691c81
      - task_key: stage_stg_orders
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/007_stg_orders.sql
          warehouse_id: 724607f766691c81
      - task_key: clean_customer_clean
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/006_customer_clean.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: stage_stg_customers
      - task_key: clean_customer_clean_quarantine
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/006_customer_clean_quarantine.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: clean_customer_clean
      environments:
      - environment_key: default
        spec:
          client: '2'
          dependencies:
          - dbt-databricks
          - pydantic>=2.0
          - pyyaml
