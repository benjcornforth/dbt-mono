resources:
  jobs:
    PROCESS_sales:
      name: PROCESS_sales (dev)
      tasks:
      - task_key: ingest_py_ingest_from_volume
        timeout_seconds: 3600
        environment_key: default
        spark_python_task:
          python_file: ../../python/ingest_from_volume.py
          parameters:
          - --schema_bronze=ben_sales
          - --schema_silver=ben_sales
          - --schema_gold=ben_sales
          - --catalog_bronze=dev_fd_bronze
          - --catalog_silver=dev_fd_silver
          - --catalog_meta=dev_fd_meta
          - --git_commit=local
          - --compute_type=serverless
      - task_key: stage_customer_orders
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/010_customer_orders.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: clean_customer_clean
        - task_key: stage_stg_orders
      - task_key: stage_customer_summary
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/011_customer_summary.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: stage_customer_orders
      - task_key: stage_stg_customers
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/007_stg_customers.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: ingest_py_ingest_from_volume
      - task_key: stage_stg_orders
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/009_stg_orders.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: ingest_py_ingest_from_volume
      - task_key: clean_customer_clean
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/008_customer_clean.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: stage_stg_customers
      - task_key: clean_customer_clean_quarantine
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/008_customer_clean_quarantine.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: clean_customer_clean
      environments:
      - environment_key: default
        spec:
          client: '2'
          dependencies:
          - dbt-databricks
          - pydantic>=2.0
          - pyyaml
          - whl: ../../dist/*.whl
