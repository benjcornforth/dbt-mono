resources:
  jobs:
    SETUP_sales:
      name: SETUP_sales (dev)
      tasks:
      - task_key: setup
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt seed --full-refresh --vars ''{"schema_bronze": "ben_sales", "schema_silver":
            "ben_sales", "schema_gold": "ben_sales", "catalog_bronze": "dev_fd_bronze",
            "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta", "git_commit":
            "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
      - task_key: create_udfs
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/000_udfs.sql
          warehouse_id: 724607f766691c81
        depends_on:
        - task_key: setup
      environments:
      - environment_key: default
        spec:
          client: '2'
          dependencies:
          - dbt-databricks
          - pydantic>=2.0
          - pyyaml
