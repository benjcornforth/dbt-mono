resources:
  jobs:
    TEARDOWN_sales:
      name: TEARDOWN_sales (dev)
      tasks:
      - task_key: teardown
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - dbt run-operation drop_all_models
          warehouse_id: 724607f766691c81
      environments:
      - environment_key: default
        spec:
          client: '2'
          dependencies:
          - dbt-databricks
