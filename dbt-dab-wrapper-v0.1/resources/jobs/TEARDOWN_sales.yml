resources:
  jobs:
    TEARDOWN_sales:
      name: TEARDOWN_sales (dev)
      tasks:
      - task_key: teardown
        timeout_seconds: 3600
        environment_key: default
        dbt_task:
          project_directory: ${workspace.file_path}
          commands:
          - dbt deps
          - 'dbt run-operation drop_all_models --vars ''{"schema_bronze": "ben_sales",
            "schema_silver": "ben_sales", "schema_gold": "ben_sales", "catalog_bronze":
            "dev_fd_bronze", "catalog_silver": "dev_fd_silver", "catalog_meta": "dev_fd_meta",
            "git_commit": "local", "compute_type": "serverless"}'''
          catalog: dev_fd_bronze
          warehouse_id: 724607f766691c81
      environments:
      - environment_key: default
        spec:
          client: '2'
          dependencies:
          - dbt-databricks
          - pydantic>=2.0
          - pyyaml
