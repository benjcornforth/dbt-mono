resources:
  jobs:
    TEARDOWN_sales:
      name: TEARDOWN_sales (dev)
      tasks:
      - task_key: backup
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/backup.sql
          warehouse_id: 724607f766691c81
          parameters:
            run_id: '{{job.run_id}}'
      - task_key: teardown
        timeout_seconds: 3600
        sql_task:
          file:
            path: ../../sql/teardown.sql
          warehouse_id: 724607f766691c81
          parameters:
            run_id: '{{job.run_id}}'
        depends_on:
        - task_key: backup
      environments:
      - environment_key: default
        spec:
          client: '2'
          dependencies:
          - dbt-databricks
          - pydantic>=2.0
          - pyyaml
