    - "INSERT INTO dev_fd_operations.ben_backups._backup_archive VALUES ('functions/average_score.sql',\
      \ 'function', 'dbt-forge', 'dev', current_timestamp(), 'ben', '75188ad', 'main',\
      \ 'PROCESS_demo', NULL, '-- UDF: average_score\n-- Pandas vectorized UDF\n--\
      \ Vectorized average using pandas \u2014 fast on large batches\nDROP FUNCTION\
      \ IF EXISTS {{ target.catalog }}.{{ target.schema }}.average_score;\nCREATE\
      \ FUNCTION {{ target.catalog }}.{{ target.schema }}.average_score(score_a double,\
      \ score_b double)\nRETURNS double\nLANGUAGE PYTHON\nRUNTIME_VERSION = ''3.11''\n\
      PACKAGES (''pandas'', ''numpy'')\nHANDLER = ''compute''\nAS $$\nimport pandas\
      \ as pd\ndef compute(score_a: pd.Series, score_b: pd.Series) -> pd.Series:\n\
      \    return (score_a + score_b) / 2.0\n$$;\n')"
    - "INSERT INTO dev_fd_operations.ben_backups._backup_archive VALUES ('functions/clean_email.sql',\
