      \ stg_orders, customer_clean, customer_orders, customer_summary\n\U0001F512\
      \ Schemas preserved (use forge dev-down for dev schemas)\n\U0001F4E6 Backup:\
      \ resources/teardown/_backup/\n\u267B\uFE0F  To re-instate: forge deploy"
  reinstate:
    command: forge deploy
    note: Re-running deploy recreates the workflow and all orchestration from source
