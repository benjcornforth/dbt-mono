  - step: 2
    name: archive_table_data
    action: sql
    statements:
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'stg_customers'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.stg_customers
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'stg_orders'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.stg_orders
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'customer_clean'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.customer_clean
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'customer_orders'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.customer_orders
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'customer_summary'
