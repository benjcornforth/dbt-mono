      \ 'PROCESS_demo', NULL, '-- UDF: loyalty_tier\n-- Assigns GOLD/SILVER/BRONZE\
      \ based on revenue\nDROP FUNCTION IF EXISTS {{ target.catalog }}.{{ target.schema\
      \ }}.loyalty_tier;\nCREATE FUNCTION {{ target.catalog }}.{{ target.schema }}.loyalty_tier(revenue\
