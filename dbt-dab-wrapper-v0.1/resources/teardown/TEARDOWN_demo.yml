      CREATE FUNCTION {{ target.catalog }}.{{ target.schema }}.clean_email(raw_email\
      \ string)\nRETURNS string\nLANGUAGE PYTHON\nRUNTIME_VERSION = ''3.11''\nHANDLER\
      \ = ''clean''\nAS $$\ndef clean(raw_email):\n    if raw_email is None:\n   \
      \     return None\n    return raw_email.strip().lower()\n$$;\n')"
    - "INSERT INTO dev_fd_operations.ben_backups._backup_archive VALUES ('functions/loyalty_tier.sql',\
