    action: copy
    source: resources/jobs/PROCESS_demo.yml
    target: resources/teardown/_backup/PROCESS_demo_20260323_134946.yml
  - step: 4
    name: remove_workflow_yaml
    action: delete_file
    target: resources/jobs/PROCESS_demo.yml
  - step: 5
