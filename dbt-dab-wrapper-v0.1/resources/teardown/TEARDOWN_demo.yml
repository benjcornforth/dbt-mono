teardown:
  name: TEARDOWN_demo
  environment: dev
  generated_at: '2026-03-23T13:28:01.043139+00:00'
  project: dbt-forge
  scope: fd
  id: demo
  removes:
  - type: dab_job
    name: PROCESS_demo
    action: delete workflow YAML + databricks bundle destroy
    path: resources/jobs/PROCESS_demo.yml
  - type: udf
    name: dev_fd_meta.ben_demo.loyalty_tier
    action: DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.loyalty_tier
    note: "Functions are code, not data \u2014 safe to remove"
  - type: udf
    name: dev_fd_meta.ben_demo.clean_email
    action: DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.clean_email
    note: "Functions are code, not data \u2014 safe to remove"
  - type: udf
    name: dev_fd_meta.ben_demo.average_score
