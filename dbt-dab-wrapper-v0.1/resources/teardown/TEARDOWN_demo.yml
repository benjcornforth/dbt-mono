    note: "Functions are code, not data \u2014 safe to remove"
  preserves:
    tables:
    - stg_customers
    - stg_orders
    - customer_clean
    - customer_orders
    - customer_summary
    schemas:
    - dev schemas
    note: All tables and data are preserved. Nothing is dropped.
  backup:
