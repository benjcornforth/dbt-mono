resources:
  jobs:
    PROCESS_demo:
      name: PROCESS_demo (dev)
      tasks:
      - task_key: ingest_raw_customers
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select raw_customers
          catalog: main
          schema: default
        environment_key: default
      - task_key: ingest_raw_orders
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select raw_orders
          catalog: main
          schema: default
        environment_key: default
      - task_key: stage_customer_orders
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select customer_orders
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: clean_customer_clean
        - task_key: stage_stg_orders
      - task_key: stage_stg_customers
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select stg_customers
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: ingest_raw_customers
      - task_key: stage_stg_orders
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select stg_orders
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: ingest_raw_orders
      - task_key: clean_customer_clean
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select customer_clean
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: stage_stg_customers
      - task_key: enrich_data_is_fresh
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select data_is_fresh
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: serve_customer_summary
      - task_key: enrich_has_customers
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select has_customers
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: serve_customer_summary
      - task_key: enrich_revenue_non_negative
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select revenue_non_negative
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: serve_customer_summary
      - task_key: serve_customer_summary
        timeout_seconds: 3600
        dbt_task:
          project_directory: dbt
          commands:
          - dbt run --select customer_summary
          catalog: main
          schema: default
        environment_key: default
        depends_on:
        - task_key: stage_customer_orders
      - task_key: enrich_run_reconciliation
        timeout_seconds: 3600
        sql_task:
          file:
            path: sql/reconcile.sql
        environment_key: default
        depends_on:
        - task_key: clean_customer_clean
      - task_key: serve_notify_slack
        timeout_seconds: 3600
        notebook_task:
          notebook_path: notebooks/slack_alert.ipynb
        environment_key: default
        depends_on:
        - task_key: serve_customer_summary
