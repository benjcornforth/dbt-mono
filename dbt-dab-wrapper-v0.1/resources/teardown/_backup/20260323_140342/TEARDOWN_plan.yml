teardown:
  name: TEARDOWN_demo
  environment: dev
  generated_at: '2026-03-23T14:03:42.271455+00:00'
  project: dbt-forge
  scope: fd
  id: demo
  archive:
    table: dev_fd_operations.ben_demo._teardown_archive
    note: All table data is archived as JSON rows before any changes
  snapshot:
    directory: resources/teardown/_backup/20260323_140342
    contents: forge.yml, graph.json, workflow YAML, UDF source files, teardown plan
    note: Complete project state captured for forge restore
  removes:
  - type: dab_job
    name: PROCESS_demo
    action: delete workflow YAML + databricks bundle destroy
    path: resources/jobs/PROCESS_demo.yml
  - type: udf
    name: dev_fd_meta.ben_demo.loyalty_tier
    action: DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.loyalty_tier
    note: "Functions are code, not data \u2014 safe to remove"
  - type: udf
    name: dev_fd_meta.ben_demo.clean_email
    action: DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.clean_email
    note: "Functions are code, not data \u2014 safe to remove"
  - type: udf
    name: dev_fd_meta.ben_demo.average_score
    action: DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.average_score
    note: "Functions are code, not data \u2014 safe to remove"
  preserves:
    tables:
    - stg_customers
    - stg_orders
    - customer_clean
    - customer_orders
    - customer_summary
    schemas:
    - dev schemas
    note: All tables and data are preserved. Nothing is dropped.
  backup:
    directory: resources/teardown/_backup
    note: Workflow YAML + table data archived before removal
  steps:
  - step: 1
    name: snapshot_all_assets
    action: snapshot
    target: resources/teardown/_backup/20260323_140342
  - step: 2
    name: create_archive_table
    action: sql
    statements:
    - CREATE TABLE IF NOT EXISTS dev_fd_operations.ben_demo._teardown_archive (  table_name
      STRING,  project STRING,  environment STRING,  archived_at TIMESTAMP,  row_data
      STRING) USING DELTA
  - step: 3
    name: archive_table_data
    action: sql
    statements:
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'stg_customers'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.stg_customers
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'stg_orders'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.stg_orders
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'customer_clean'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.customer_clean
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'customer_orders'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.customer_orders
    - INSERT INTO dev_fd_operations.ben_demo._teardown_archive SELECT 'customer_summary'
      AS table_name, 'dbt-forge' AS project, 'dev' AS environment, current_timestamp()
      AS archived_at, to_json(struct(*)) AS row_data FROM dev_fd_bronze.ben_demo.customer_summary
  - step: 4
    name: remove_workflow_yaml
    action: delete_file
    target: resources/jobs/PROCESS_demo.yml
  - step: 5
    name: drop_udfs
    action: sql
    statements:
    - DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.loyalty_tier
    - DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.clean_email
    - DROP FUNCTION IF EXISTS dev_fd_meta.ben_demo.average_score
  - step: 6
    name: confirm
    action: log
    message: 'Teardown complete.

      Snapshot saved: resources/teardown/_backup/20260323_140342/

      Table data archived to: dev_fd_operations.ben_demo._teardown_archive

      Tables preserved: stg_customers, stg_orders, customer_clean, customer_orders,
      customer_summary

      Schemas preserved (use forge dev-down for dev schemas)

      To re-instate: forge deploy

      To restore: forge restore --snapshot 20260323_140342'
  reinstate:
    command: forge deploy
    note: Re-running deploy recreates the workflow and all orchestration from source
