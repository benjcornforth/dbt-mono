bundle:
  name: sales_data_sales
include:
- resources/jobs/SETUP_sales.yml
- resources/jobs/PROCESS_sales.yml
- resources/jobs/TEARDOWN_sales.yml
artifacts:
  forge_wheel:
    type: whl
    build: poetry build
    path: .
sync:
  include:
  - macros/
  - python/
  - dbt/
  - dbt_project.yml
  - profiles.yml
  - forge.yml
targets:
  dev:
    workspace:
      profile: dev
    default: true
  prod:
    workspace:
      profile: PROD
