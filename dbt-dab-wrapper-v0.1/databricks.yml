bundle:
  name: sales_data_sales
include:
- resources/jobs/SETUP_sales.yml
- resources/jobs/PROCESS_sales.yml
- resources/jobs/TEARDOWN_sales.yml
artifacts:
  forge_wheel:
    type: whl
    build: poetry build
    path: .
sync:
  include:
  - dbt-dab-tools/
  - sql/
targets:
  dev:
    workspace:
      profile: dev
    default: true
  prod:
    workspace:
      profile: PROD
