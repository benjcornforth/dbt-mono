# forge.yml — Sales Data Pipeline
# The ONLY config file you ever edit (alongside dbt/ddl/ model definitions).
# A child can change 3 lines and redeploy everything.

name: sales_data
scope: fd
id: sales

placements:
  families:
    domain:
      allowed_classes: [domain]
      allowed_layers: [bronze, silver, gold]
      catalog_pattern: "{env}_{scope}_{layer}"
      schema_pattern: "{user}_{domain}"

    shared_meta:
      allowed_classes: [shared]
      allowed_layers: [meta]
      catalog_pattern: "{env}_{scope}_meta"
      schema_pattern: "{user}_{namespace}"

    shared_ops:
      allowed_classes: [shared]
      allowed_layers: [operations]
      catalog_pattern: "{env}_{scope}_ops"
      schema_pattern: "{user}_{namespace}"

    system_meta:
      allowed_classes: [system]
      allowed_layers: [meta]
      catalog_pattern: "{env}_{scope}_meta"
      schema_pattern: "{user}_{system}"

    system_ops:
      allowed_classes: [system]
      allowed_layers: [operations]
      catalog_pattern: "{env}_{scope}_ops"
      schema_pattern: "{user}_{system}"

domains:
  sales:
    placement_family: domain

shared_namespaces:
  config:
    placement_family: shared_meta
    layer: meta

  metadata:
    placement_family: shared_meta
    layer: meta

  operations:
    placement_family: shared_ops
    layer: operations

system_assets:
  lineage:
    enabled: true
    placement_family: system_meta
    layer: meta
    system: lineage

  quarantine:
    enabled: true
    placement_family: system_meta
    layer: meta
    system: quarantine

  backups:
    enabled: true
    placement_family: system_ops
    layer: operations
    system: backups

  deployment_state:
    enabled: true
    placement_family: system_ops
    layer: operations
    system: deploy

profiles:
  dev:
    platform: databricks
    databricks_profile: dev
    env: dev
    compute:
      type: serverless
      auto_scale: true

  prod:
    platform: databricks
    databricks_profile: PROD
    env: prd
    compute:
      type: serverless
    schedule: "0 0 6 * * ?"

  local:
    platform: postgres
    connection:
      host: localhost
      port: 5432
      database: sales_db
    catalog: public
    schema: sales
    overrides:
      placement_families:
        domain:
          catalog: public
        shared_meta:
          catalog: public
        shared_ops:
          catalog: public
        system_meta:
          catalog: public
        system_ops:
          catalog: public
    compute:
      type: local

features:
  graph: true
  quarantine: true
  validation_exceptions: true
  prior_version: true
  python_udfs: true

lineage:
  mode: full
  origin_tracking: true

portability:
  postgres_compatible: true
