# forge.yml — Sales Data Pipeline
# The ONLY config file you ever edit (alongside dbt/ddl/ model definitions).
# A child can change 3 lines and redeploy everything.

name: sales_data
scope: fd
id: sales
active_profile: dev

# ── Naming Patterns ──
# Tokens: {env}, {id}, {scope}, {user}, {catalog}, {schema}
catalog_pattern: "{env}_{scope}_{catalog}"     # → dev_fd_bronze
schema_pattern:  "{user}_{id}"                 # → ben_sales
skip_env_prefix: [prd, prod]

catalogs: [bronze, silver, meta]
schemas:  [bronze, silver, gold]

# ── Profiles ──
profiles:
  dev:
    platform: databricks
    databricks_profile: dev
    env: dev
    catalog: bronze
    compute:
      type: serverless
      auto_scale: true

  prod:
    platform: databricks
    databricks_profile: PROD
    env: prd
    catalog: bronze
    compute:
      type: serverless
    schedule: "0 0 6 * * ?"           # daily at 6 AM UTC

  local:
    platform: postgres
    connection:
      host: localhost
      port: 5432
      database: sales_db
    catalog: public
    schemas:
      bronze: bronze
      silver: silver
      gold: gold
    catalogs:
      bronze: public
      silver: public
    compute:
      type: local

# ── Features ──
features:
  graph: true
  quarantine: true
  validation_exceptions: true
  prior_version: true
  python_udfs: true

# ── Lineage ──
lineage:
  mode: full
  origin_tracking: true

portability:
  postgres_compatible: true

# ── Python Tasks ──
python_tasks:
  ingest_from_volume:
    stage: ingest
    description: "Reads files from landing Volume → raw tables"
    template: ingest
