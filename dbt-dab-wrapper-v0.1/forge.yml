name: dbt-forge
scope: fd                            # scope e.g. fd = foundational_data, client = crm data
id: demo                        # project identifier — used in catalog_pattern
active_profile: dev

# =============================================
# NAMING PATTERNS
# =============================================
# Patterns control how catalog and schema names are constructed.
# Available tokens: {env}, {id}, {scope}, {user}, {catalog}, {schema}
#   {env}     — from the profile's env: key (e.g. dev, int, prd)
#   {id}      — from the top-level id: key (e.g. myproject)
#   {scope}   — from the top-level scope: key (e.g. fd)
#   {user}    — current OS / Databricks user (e.g. ben)
#   {catalog} — the logical catalog name (e.g. bronze, meta)
#   {schema}  — the logical schema name  (e.g. bronze, silver)
#
# Production environments (prd/prod) skip the {env}_ prefix for schemas only.
# Catalogs always keep the full {env}_ prefix across all environments.
# Set skip_env_prefix: [prd, prod] to control which envs get bare schema names.

catalog_pattern: "{env}_{scope}_{catalog}"     # → dev_fd_bronze, prd_fd_meta (always prefixed)
schema_pattern:  "{user}_{id}"    # → ben_demo (prd → demo)
skip_env_prefix: [prd, prod]               # these envs drop {env}_ from schemas only

# =============================================
# LOGICAL CATALOGS & SCHEMAS
# =============================================
# Define logical names here. Actual names are built via the patterns above.

catalogs:
  - bronze
  - silver
  - meta
  - operations

schemas:
  - bronze
  - silver
  - gold

# =============================================
# DOMAINS — multi-instance model support
# =============================================
# Each domain generates a separate .sql file per model with a suffixed schema.
# domain_layers controls which layers get domain instances (bronze stays shared).
domains:
  eu:
    schema_suffix: "_eu"
  us:
    schema_suffix: "_us"
  apac:
    schema_suffix: "_apac"

domain_layers: [silver, gold]

# =============================================
# PROFILES – multi-environment, multi-platform
# =============================================
# Each profile can reference a ~/.databrickscfg profile
# for zero-env-var setup:
#   databricks configure --profile DEV
#   Then just set databricks_profile: DEV below.
#
# Or use env vars (DBT_DATABRICKS_HOST, etc.) as before.
# Or define connection: inline for non-Databricks platforms.

profiles:
  dev:
    platform: databricks
    databricks_profile: dev
    env: dev
    catalog: bronze                  # default catalog for this profile
    compute:
      type: serverless
      auto_scale: true

  prod:
    platform: databricks
    databricks_profile: PROD
    env: prd
    catalog: bronze
    compute:
      type: serverless
    schedule: "0 0 6 * * ?"

  int:
    platform: databricks
    databricks_profile: INT
    env: int
    catalog: bronze
    compute:
      type: serverless

  local:
    platform: postgres
    connection:
      host: localhost
      port: 5432
      database: dev_warehouse
      user: postgres
    catalog: public
    schemas:                         # explicit — no pattern for local
      bronze: bronze
      silver: silver
      gold:   gold
    catalogs:                        # explicit — no pattern for local
      bronze: public
      silver: public
      meta: public
      operations: public
    compute:
      type: local

# =============================================
# SHARED SETTINGS (apply to all profiles)
# =============================================
dbt:
  version: 1.8.0
features:
  graph: true
  quarantine: true
  validation_exceptions: true
  prior_version: true
  python_udfs: true

# =============================================
# LINEAGE & ORIGIN TRACKING
# =============================================
# mode: full | lightweight
#   full        — captures runtime input values, UDF metadata, origin details
#   lightweight — captures column names + expressions only (no runtime values)
#
# origin_tracking: true | false
#   When true, origin: blocks in DDL files are compiled into the
#   _lineage struct so every value is traceable to its physical source.
lineage:
  mode: full
  origin_tracking: true

portability:
  avoid_databricks_only: true
  postgres_compatible: true

# =============================================
# CUSTOM TASKS – user-defined workflow tasks
# =============================================
# Each entry needs task_key + one task type (python_task, sql_task, notebook_task).
# Optional: stage (default=enrich), depends_on (list of model/task names), config.
custom_tasks:
  - task_key: run_reconciliation
    sql_task: sql/reconcile.sql
    stage: enrich
    depends_on: [customer_clean]

  - task_key: notify_slack
    notebook_task: notebooks/slack_alert.ipynb
    stage: serve
    depends_on: [customer_summary]
