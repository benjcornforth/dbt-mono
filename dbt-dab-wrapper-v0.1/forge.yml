name: dbt-forge
scope: fd                            # scope e.g. fd = foundational_data, client = crm data
id: demo                        # project identifier — used in catalog_pattern
active_profile: dev

# =============================================
# NAMING PATTERNS
# =============================================
# Patterns control how catalog and schema names are constructed.
# Available tokens: {env}, {id}, {scope}, {user}, {catalog}, {schema}
#   {env}     — from the profile's env: key (e.g. dev, int, prd)
#   {id}      — from the top-level id: key (e.g. myproject)
#   {scope}   — from the top-level scope: key (e.g. fd)
#   {user}    — current OS / Databricks user (e.g. ben)
#   {catalog} — the logical catalog name (e.g. bronze, meta)
#   {schema}  — the logical schema name  (e.g. bronze, silver)
#
# Production environments (prd/prod) skip the {env}_ prefix for schemas only.
# Catalogs always keep the full {env}_ prefix across all environments.
# Set skip_env_prefix: [prd, prod] to control which envs get bare schema names.

catalog_pattern: "{env}_{scope}_{catalog}"     # → dev_fd_bronze, prd_fd_meta (always prefixed)
schema_pattern:  "{env}_{id}"           # → dev_myproject (prd → myproject)
skip_env_prefix: [prd, prod]               # these envs drop {env}_ from schemas only

# =============================================
# LOGICAL CATALOGS & SCHEMAS
# =============================================
# Define logical names here. Actual names are built via the patterns above.

catalogs:
  - bronze
  - silver
  - meta
  - operations

schemas:
  - bronze
  - silver
  - gold

# =============================================
# PROFILES – multi-environment, multi-platform
# =============================================
# Each profile can reference a ~/.databrickscfg profile
# for zero-env-var setup:
#   databricks configure --profile DEV
#   Then just set databricks_profile: DEV below.
#
# Or use env vars (DBT_DATABRICKS_HOST, etc.) as before.
# Or define connection: inline for non-Databricks platforms.

profiles:
  dev:
    platform: databricks
    databricks_profile: DEFAULT
    env: dev
    catalog: bronze                  # default catalog for this profile
    compute:
      type: serverless
      auto_scale: true

  prod:
    platform: databricks
    databricks_profile: PROD
    env: prd
    catalog: bronze
    compute:
      type: serverless
    schedule: "0 0 6 * * ?"

  int:
    platform: databricks
    databricks_profile: INT
    env: int
    catalog: bronze
    compute:
      type: serverless

  local:
    platform: postgres
    connection:
      host: localhost
      port: 5432
      database: dev_warehouse
      user: postgres
    catalog: public
    schemas:                         # explicit — no pattern for local
      bronze: bronze
      silver: silver
      gold:   gold
    catalogs:                        # explicit — no pattern for local
      bronze: public
      silver: public
      meta: public
      operations: public
    compute:
      type: local

# =============================================
# SHARED SETTINGS (apply to all profiles)
# =============================================
dbt:
  version: 1.8.0
features:
  graph: true
  quarantine: true
  validation_exceptions: true
  prior_version: true
  python_udfs: true
portability:
  avoid_databricks_only: true
  postgres_compatible: true
